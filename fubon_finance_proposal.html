section {
  font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  padding: 52px 64px;

}
section::after {
  font-size: 13px;
  color: #aaa;
}

  line-height: 1.25;
}
h2 {
  font-size: 26px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 0.5em;
  border-bottom: 2px solid var(--color-teal-mid);
  padding-bottom: 0.3em;
}
h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--color-teal);
  margin-bottom: 0.3em;
}
p { margin: 0.4em 0; }
ul { margin: 0.3em 0 0.3em 1.2em; }
li { margin: 0.25em 0; }
strong { font-weight: 600; }
.tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 12px;
  border-radius: 20px;
  margin-right: 6px;
}
.tag-teal { background: var(--color-teal-light); color: var(--color-teal); }
.tag-purple { background: var(--color-purple-light); color: var(--color-purple); }
.tag-amber { background: var(--color-amber-light); color: var(--color-amber); }
.card {
  background: var(--color-surface);
  border-left: 4px solid var(--color-teal-mid);
  border-radius: 0 10px 10px 0;
  padding: 14px 18px;
  margin: 10px 0;
}
.card-purple {
  border-left-color: var(--color-purple);
}
.card-amber {
  border-left-color: #BA7517;
}

  display: flex;
  gap: 16px;
  margin: 16px 0;
}

  background: var(--color-surface);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

  font-weight: 700;
  color: var(--color-teal);

  gap: 20px;

  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}

  background: var(--color-surface);
  border-radius: 10px;
  padding: 16px;
}
.scenario-num {
  font-size: 11px;
  font-weight: 600;
  color: var(--color-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.scenario-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 8px;
}
.bubble-q {
  background: #f0f0ed;
  border-radius: 10px 10px 10px 0;
  padding: 8px 12px;
  font-size: 13px;
  margin-bottom: 6px;
  color: #333;
}
.bubble-a {
  background: var(--color-teal-light);
  border-radius: 10px 10px 0 10px;
  padding: 8px 12px;
  font-size: 13px;
  color: #085041;
}
.bubble-a-purple {
  background: var(--color-purple-light);
  color: #26215C;
  border-radius: 10px 10px 0 10px;
  padding: 8px 12px;
  font-size: 13px;
}
.bubble-a-amber {
  background: var(--color-amber-light);
  color: #412402;
  border-radius: 10px 10px 0 10px;
  padding: 8px 12px;
  font-size: 13px;
}
.pain-box {
  background: var(--color-surface);
  border-radius: 10px;
  padding: 14px 16px;
  border-top: 3px solid;
}
.flow-step {
  display: inline-flex;
  align-items: center;
  background: var(--color-surface);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 13px;
  font-weight: 500;
  margin: 0 2px;
}
.flow-highlight {
  background: var(--color-teal-light);
  color: var(--color-teal);
}
.quote-box {
  background: var(--color-teal-light);
  border-left: 5px solid var(--color-teal-mid);
  border-radius: 0 12px 12px 0;
  padding: 20px 24px;
  margin: 20px 0;
  font-size: 18px;
  line-height: 1.8;
  color: #085041;
}

<h2 id="%E5%B9%BB%E8%A6%BA%E5%81%B5%E6%B8%AC%E8%88%87%E8%A9%95%E4%BC%B0%E6%96%B9%E6%B3%95">幻覺偵測與評估方法</h2>
<div class="two-col" style="margin-top: 8px;">
<div>
<p><strong>三層防護機制</strong></p>
<div class="card" style="margin: 8px 0;">
<span style="font-size: 13px;"><strong>① Prompt 約束層</strong><br />
系統提示明確規定「只能使用以下 context 中的資訊回答。若找不到相關資訊，請回答：根據現有年報資料，無法回答此問題。」，禁止模型使用訓練知識補充。</span>
</div>
<div class="card" style="margin: 8px 0;">
<span style="font-size: 13px;"><strong>② 數字錨點驗證層</strong><br />
對答案中出現的所有數字，回頭在原始 PDF 對應頁碼做字串比對。若數字不在被引用的頁面，標記為「需人工確認」。</span>
</div>
<div class="card" style="margin: 8px 0;">
<span style="font-size: 13px;"><strong>③ 來源頁碼強制輸出</strong><br />
每則答案必須附上「依據年報第 X 頁，§X.X.X 節」，讓人工複核成本降至最低。</span>
</div>
</div>
<div>
<p><strong>Accuracy 評估框架</strong></p>
<table>
<tr><th>題型</th><th>評估方式</th><th>容忍標準</th></tr>
<tr><td>數字類</td><td>Exact Match</td><td>±0（嚴格）或 ±5%（容忍）</td></tr>
<tr><td>敘述類</td><td>Semantic Similarity</td><td>cosine ≥ 0.85</td></tr>
<tr><td>複合類</td><td>兩者分開計算</td><td>分別報告</td></tr>
</table>
<div class="card card-amber" style="margin-top: 14px;">
<span style="font-size: 13px;"><strong>評估數據集：</strong>依題目附件問答集計算，數字題與敘述題分開報告 Accuracy，讓結果更具可解釋性，避免用單一指標掩蓋不同類型的失敗模式。</span>
</div>

<h2 id="%E8%B3%87%E6%96%99%E5%89%8D%E8%99%95%E7%90%86%E6%B4%9E%E5%AF%9F">資料前處理洞察</h2>
<div class="card" style="margin-bottom: 18px;">
<strong>核心發現：</strong>年報不是純文字文件，是高度結構化的排版文件。傳統「直接 pdftotext → 切 chunk」在這份年報上會失敗。
</div>
<div class="three-col" style="margin-top: 16px;">
<div class="scenario-box">
<div class="scenario-num">洞察 01</div>
<div class="scenario-title" style="font-size: 14px;">CID 字體編碼異常</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 6px;">Adobe InDesign 輸出的 PDF 存在 Adobe-CNS1 字體映射問題，pdftotext 提取出現 <code>(cid:3712)</code> 亂碼。</div>
<div style="margin-top: 10px; font-size: 13px;"><span class="check">✓</span> <strong>解法：</strong>對受影響頁面改用 pdftoppm rasterize，以視覺解析取代文字提取。</div>
</div>
<div class="scenario-box">
<div class="scenario-num">洞察 02</div>
<div class="scenario-title" style="font-size: 14px;">表格數字語境依賴</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 6px;">「177,915」單獨出現無意義，必須與「用愛心做朋友助學活動受惠學生人次」綁定，才能正確回答數字問題。</div>
<div style="margin-top: 10px; font-size: 13px;"><span class="check">✓</span> <strong>解法：</strong>pdfplumber 表格提取，整行保留，不截斷 row。</div>
</div>
<div class="scenario-box">
<div class="scenario-num">洞察 03</div>
<div class="scenario-title" style="font-size: 14px;">章節跨頁結構</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 6px;">§4.13 企業責任章節橫跨第 215–224 頁，中間夾雜員工訓練表格，固定 size chunking 會混淆語意邊界。</div>
<div style="margin-top: 10px; font-size: 13px;"><span class="check">✓</span> <strong>解法：</strong>以標題層級為邊界的 Semantic Chunking，章節完整性優先。</div>
</div>
</div>
<div class="footer-note">以上洞察均基於實際解析 2024 富邦金控年報 PDF 所得，非理論推演。</div>

<h2 id="%E5%A0%B4%E6%99%AF%E4%B8%80ngo-%E5%85%AC%E7%9B%8A%E5%90%88%E4%BD%9C%E5%AA%92%E5%90%88">場景一：NGO 公益合作媒合</h2>
<div style="margin-bottom: 12px;"><span class="tag tag-teal">使用者：公益團體 / NGO</span> <span style="font-size: 13px; color: var(--color-muted);">環保、教育、弱勢關懷等非營利組織，尋找企業合作夥伴</span></div>
<div class="two-col">
<div>
<p><strong>現在怎麼做（痛點）</strong></p>
<ul>
<li>透過人脈打聽「哪家銀行支持這個議題」</li>
<li>自行瀏覽富邦官網，資訊分散在五個基金會</li>
<li>寄出冷門信，等待 IR 部門人工回覆</li>
<li>平均需 1–2 週才能確認合作可行性</li>
</ul>
<p><strong>RAG 能改變什麼</strong></p>
<ul>
<li>輸入議題，立即知道富邦哪個基金會對口</li>
<li>取得歷年合作案例、捐贈規模、聯絡方式</li>
<li>評估合作契合度，降低無效接洽比率</li>
</ul>
</div>
<div>
<p><strong>示範問答</strong></p>
<div class="bubble-q">「我們是偏鄉教育 NPO，富邦有支持相關計畫嗎？怎麼合作？」</div>
<div class="bubble-a">富邦文教基金會長期耕耘兒少教育逾 30 年，旗下「好正學堂」專門對接社企與 NPO，採不同場域的親身體驗形式。2024 年助學捐款達 1 億元，受惠 177,915 人次。建議聯絡：pr@fubon.com（依據年報第 222 頁，§4.13.1 節）</div>
<div style="margin-top: 12px; font-size: 13px; color: var(--color-muted);">
<span class="check">✓ 落地價值：</span>降低 IR/PR 人工接洽成本，提升合作媒合效率，讓 5 億公益資源找到更多對口夥伴
</div>
</div>

<h2 id="%E5%A0%B4%E6%99%AF%E4%BA%8Cesg-%E6%95%B8%E5%AD%97%E5%8D%B3%E6%99%82%E6%9F%A5%E8%A9%A2">場景二：ESG 數字即時查詢</h2>
<div style="margin-bottom: 12px;"><span class="tag tag-purple">使用者：媒體記者 / ESG 分析師 / 法人機構</span> <span style="font-size: 13px; color: var(--color-muted);">需要精確數據且要有可驗證出處</span></div>
<div class="two-col">
<div>
<p><strong>現在怎麼做（痛點）</strong></p>
<ul>
<li>記者截稿壓力下需快速找到精確數字</li>
<li>IR 部門需人工翻閱年報，耗時且易出錯</li>
<li>引用無出處的數字，對銀行是法遵風險</li>
<li>ESG 評等機構提交資料時需逐頁核對</li>
</ul>
<p><strong>RAG 能改變什麼</strong></p>
<ul>
<li>任何 ESG 指標問答，秒級回應</li>
<li>每個答案強制附上年報頁碼</li>
<li>記者可直接引用「依年報第X頁」</li>
<li>降低數字錯誤引用導致的公關風險</li>
</ul>
</div>
<div>
<p><strong>示範問答</strong></p>
<div class="bubble-q">「富邦 2024 年在弱勢關懷上投入多少？有哪些計畫？」</div>
<div class="bubble-a-purple">2024 年弱勢關懷支出：急難救助專案投入 4,371 萬元，受惠個案 138,021 人次；「用愛心做朋友」助學捐款 106,749,000 元，受惠學生 177,915 人次。全年捐贈總額 498,005,819 元。（依據年報第 222–223 頁，§4.13.3 節）</div>
<div style="margin-top: 12px; font-size: 13px; color: var(--color-muted);">
<span class="check">✓ 落地價值：</span>強化 ESG 資訊可信度，降低媒體誤引風險，支援 DJSI、MSCI 等國際評等資料提交
</div>

<div class="three-col" style="margin-top: 16px;">
<div class="scenario-box">
<div class="scenario-num">差異化 01</div>
<div class="scenario-title" style="font-size: 15px;">場景驅動，非技術驅動</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 8px; line-height: 1.6;">多數 RAG 系統從技術能力出發，本系統從「誰在痛、痛在哪」出發，三個場景對應三種真實使用者，落地路徑清晰。</div>
</div>
<div class="scenario-box">
<div class="scenario-num">差異化 02</div>
<div class="scenario-title" style="font-size: 15px;">數字可驗證，幻覺可追溯</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 8px; line-height: 1.6;">每個答案強制附頁碼，數字類答案額外做字串錨點驗證，幻覺偵測有方法論支撐，不只是「盡力而為」。</div>
</div>
<div class="scenario-box">
<div class="scenario-num">差異化 03</div>
<div class="scenario-title" style="font-size: 15px;">資料洞察源自真實解析</div>
<div style="font-size: 13px; color: var(--color-muted); margin-top: 8px; line-height: 1.6;">CID 字體異常、表格語境依賴、章節跨頁結構——三項洞察均來自實際解析這份年報的過程，非理論推演。</div>
</div>
</div>
<div class="two-col" style="margin-top: 16px;">
<div>
<p><strong>與一般年報 RAG 的差異</strong></p>
<table>
<thead>
<tr>
<th>面向</th>
<th>一般做法</th>
<th>本系統</th>
</tr>
</thead>
<tbody>
<tr>
<td>場景定義</td>
<td>財務問答</td>
<td>公益媒合 + ESG 查詢 + 品牌溝通</td>
</tr>
<tr>
<td>幻覺處理</td>
<td>Prompt 約束</td>
<td>三層防護 + 數字錨點驗證</td>
</tr>
<tr>
<td>Chunking</td>
<td>固定長度</td>
<td>標題邊界 + 表格整體保留</td>
</tr>
</tbody>
</table>
</div>
<div>
<p><strong>對評審問題的直接回應</strong></p>
<div class="card card-amber" style="font-size: 13px;">
「具差異化或創新分析方法」→ Hybrid Search + Reranking + 數字錨點三層設計<br /><br />
「有意義的 Insight」→ CID 字體 / 表格語境 / 章節跨頁三項前處理發現<br /><br />
「金融業落地價值」→ NGO 媒合 / ESG 查詢 / 品牌溝通三場景對應真實痛點
</div>

<h1 id="fubon-annual-report-rag-system">Fubon Annual Report RAG System</h1>
<h2 id="a-smart-query-assistant-for-esg--public-welfare-information"><em>A Smart Query Assistant for ESG &amp; Public Welfare Information</em></h2>
<div class="accent-line"></div>
<p><strong>Background</strong> — Fubon Financial Holding's 2024 Annual Report (272 pages) contains nearly NT$500M in charitable contributions, 177,915 student beneficiaries, and 98,000 trees planted — yet this information is inaccessible to most stakeholders without reading the entire document.</p>
<p><strong>System</strong> — We built a Retrieval-Augmented Generation (RAG) system using <em>pdfplumber</em> for table-aware extraction, semantic chunking aligned with section headers, and Hybrid Search (vector + BM25). Every answer includes a mandatory page citation, and numeric answers are validated against the source PDF to detect hallucinations.</p>
<p><strong>Three Landing Scenarios</strong></p>
<table>
<thead>
<tr>
<th>Scenario</th>
<th>User</th>
<th>Value</th>
</tr>
</thead>
<tbody>
<tr>
<td>NGO Partnership Matching</td>
<td>Non-profits seeking collaboration</td>
<td>Reduces cold-outreach friction; connects resources to partners</td>
</tr>
<tr>
<td>ESG Data Query</td>
<td>Media, ESG rating agencies</td>
<td>Provides citable, page-referenced answers in seconds</td>
</tr>
<tr>
<td>Brand Communication</td>
<td>General public</td>
<td>Transforms compliance data into emotionally resonant stories</td>
</tr>
</tbody>
</table>
<p><strong>Key Differentiators</strong> — (1) Scenario-first design grounded in real user pain points; (2) Three-layer hallucination defense including numeric anchor verification; (3) Preprocessing insights from actual PDF parsing (CID font encoding, table context preservation, cross-page section structure).</p>
<p><strong>Conclusion</strong> — Fubon's public investment doesn't lack data. It lacks an accessible entry point. This system is that entry point.</p>
