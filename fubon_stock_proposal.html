</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-paginate="true" data-class="cover" data-theme="default" data-style="@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&amp;family=Inter:wght@400;600;700;800&amp;display=swap');

* { box-sizing: border-box; }

section {
  font-family: 'Noto Sans TC', 'Inter', sans-serif;
  background: #F7F9FC;
  color: #1A2340;
  padding: 48px 60px;
  font-size: 15px;
  line-height: 1.6;
}

/* ── Cover ── */
section.cover {
  background: linear-gradient(135deg, #0B2545 0%, #1A4A7A 55%, #0E7490 100%);
  color: #fff;
  padding: 72px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
section.cover .tag {
  display: inline-block;
  background: rgba(14,116,144,0.5);
  border: 1px solid rgba(14,116,144,0.9);
  border-radius: 6px;
  padding: 5px 16px;
  font-size: 13px;
  font-weight: 700;
  color: #7DD3FC;
  margin-bottom: 28px;
  letter-spacing: 1px;
}
section.cover h1 {
  font-size: 44px;
  font-weight: 900;
  line-height: 1.25;
  margin: 0 0 18px;
  color: #fff;
}
section.cover p { font-size: 17px; color: rgba(255,255,255,0.7); margin: 0; }
section.cover .meta {
  margin-top: 44px;
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  border-top: 1px solid rgba(255,255,255,0.15);
  padding-top: 18px;
}
section.cover::after { color: rgba(255,255,255,0.3) !important; }

/* ── Closing ── */
section.closing {
  background: linear-gradient(135deg, #0B2545 0%, #1A4A7A 60%, #0E7490 100%);
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
section.closing h1 { color: #fff; font-size: 38px; margin-bottom: 16px; }
section.closing p { color: rgba(255,255,255,0.68); font-size: 16px; max-width: 560px; margin: 0; }
section.closing::after { color: rgba(255,255,255,0.3) !important; }

/* ── Typography ── */
h1 { font-size: 28px; font-weight: 800; color: #0B2545; margin: 0 0 22px; }
h2 { font-size: 24px; font-weight: 800; color: #0B2545; margin: 0 0 18px; }
h3 { font-size: 15px; font-weight: 700; color: #1A4A7A; margin: 0 0 7px; }
p  { margin: 0 0 10px; }
ul { padding-left: 20px; margin: 0; }
li { margin-bottom: 4px; font-size: 13px; }

/* ── Cards ── */
.cg { display: grid; gap: 14px; }
.cg.c2 { grid-template-columns: 1fr 1fr; }
.cg.c3 { grid-template-columns: 1fr 1fr 1fr; }
.cg.c4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.card {
  background: #fff;
  border-radius: 10px;
  padding: 18px 20px;
  border-left: 4px solid #0E7490;
  box-shadow: 0 2px 10px rgba(11,37,69,0.07);
}
.card.blue   { border-left-color: #1A4A7A; }
.card.teal   { border-left-color: #0E7490; }
.card.green  { border-left-color: #059669; }
.card.amber  { border-left-color: #D97706; }
.card.red    { border-left-color: #DC2626; }
.card.purple { border-left-color: #7C3AED; }
.card h3 { font-size: 14px; margin-bottom: 6px; }
.card p, .card ul { font-size: 13px; color: #374151; margin: 0; }

/* ── Steps ── */
.steps { display: flex; gap: 8px; align-items: stretch; }
.step {
  flex: 1;
  background: #fff;
  border-radius: 9px;
  padding: 14px 12px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(11,37,69,0.07);
  position: relative;
